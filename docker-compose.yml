services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geospatial-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - /app/backend/__pycache__
    environment:
      - ENV=development
    networks:
      - geospatial-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geospatial-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - geospatial-network

networks:
  geospatial-network:
    driver: bridge
